// ── Business day countdown ────────────────────────────────────────────────────
function addBusinessDays(dateIso, days) {
  const d = new Date(dateIso);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    if (day !== 0 && day !== 6) added++;
  }
  return d;
}

function businessDayStatus(triggeredDateIso) {
  if (!triggeredDateIso) return null;
  const deadline = addBusinessDays(triggeredDateIso, 5);
  const now = new Date();
  const msLeft = deadline - now;
  const daysLeft = Math.ceil(msLeft / (1000 * 60 * 60 * 24));
  if (daysLeft < 0) return { label: `${Math.abs(daysLeft)}d OVERDUE`, overdue: true, daysLeft };
  if (daysLeft === 0) return { label: "DUE TODAY", overdue: false, urgent: true, daysLeft };
  if (daysLeft === 1) return { label: "1 day left", overdue: false, urgent: true, daysLeft };
  return { label: `${daysLeft} days left`, overdue: false, urgent: false, daysLeft };
}

function computeAwards(people, bets, settled) {
  // Returns array of { award, winner, value, extra }
  const stats = people.map(p => ({
    ...p,
    dogsEaten: settled.filter(b => b.recipientId === p.id).length,
    charges:   settled.filter(b => b.debtorId === p.id).length,
    pending:   bets.filter(b => b.debtorId === p.id && b.status === "pending").length,
    triggered: bets.filter(b => b.debtorId === p.id && b.status === "triggered").length,
    pendingForMe: bets.filter(b => b.recipientId === p.id && b.status === "pending").length,
    owedToMe:  bets.filter(b => b.recipientId === p.id && b.status === "triggered").length,
  }));

  const results = [];

  for (const award of AWARDS) {
    if (award.calcSpecial) {
      // Rivalry — find pair with most shared bets
      const pairCount = {};
      const allBets = [...bets, ...settled];
      for (const b of allBets) {
        const ids = [b.debtorId, b.recipientId].filter(id => !id.startsWith("__")).sort();
        if (ids.length === 2) {
          const key = ids.join("|");
          pairCount[key] = (pairCount[key] || 0) + 1;
        }
      }
      const topPair = Object.entries(pairCount).sort((a, b) => b[1] - a[1])[0];
      if (topPair && topPair[1] >= award.min) {
        const [id1, id2] = topPair[0].split("|");
        const p1 = people.find(p => p.id === id1);
        const p2 = people.find(p => p.id === id2);
        if (p1 && p2) {
          results.push({ award, winner: p1, value: topPair[1], extra: p2.name, rivalName: p2.name });
        }
      }
      continue;
    }

    const scored = stats.map(p => ({ p, val: award.calc(p, bets, settled) }))
      .filter(x => x.val >= award.min)
      .sort((a, b) => b.val - a.val);

    if (scored.length > 0) {
      results.push({ award, winner: scored[0].p, value: scored[0].val, extra: null });
    }
  }

  return results;
}

const INITIAL_STATE = { people: [], bets: [], settled: [] };

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbw7gdRD9FWDb5j7F7IjoJQhkFPq7DkfTHArgNI-QCP-AlsWz0Ay4rT9Bhh0VZN-Omj_/exec";

async function loadState(pwd) {
  try {
    const res = await fetch(API_URL + "?action=load&pwd=" + encodeURIComponent(pwd));
    const data = await res.json();
    if (data.error) return null;
    return data.state || INITIAL_STATE;
  } catch {
    return null;
  }
}

async function saveState(s, pwd) {
  try {
    // Use no-cors mode with POST — Apps Script ignores preflight
    const body = JSON.stringify({ action: "save", state: s, pwd });
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body,
    });
  } catch(e) { console.warn("Save failed:", e); }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function initials(name) { return name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2); }

function recInfo(recipientId, people) {
  const sp = SPECIAL_TARGETS.find(t => t.id === recipientId);
  if (sp) return { label: sp.name, emoji: sp.emoji, special: true };
  const p = people.find(x => x.id === recipientId);
  return { label: p?.name ?? "?", emoji: null, special: false, person: p };
}

function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function personStats(personId, bets, settled) {
  const pending   = bets.filter(b => b.debtorId === personId && b.status === "pending").length;
  const triggered = bets.filter(b => b.debtorId === personId && b.status === "triggered").length;
  const pendingForMe = bets.filter(b => b.recipientId === personId && b.status === "pending").length;
  const owedToMe     = bets.filter(b => b.recipientId === personId && b.status === "triggered").length;
  const dogsEaten = settled.filter(b => b.recipientId === personId).length;
  const charges   = settled.filter(b => b.debtorId   === personId).length;
  return { pending, triggered, pendingForMe, owedToMe, dogsEaten, charges, totalDebt: pending + triggered };
}

              cursor: "pointer", fontFamily: "'Black Han Sans', sans-serif",

              animation: "pulse 1.8s ease-in-out infinite", whiteSpace: "nowrap",
            }}>{isExec ? "🍗 Chicken Delivered!" : "🌭 Dog Delivered!"}</button>
          )}
        </div>

        {/* Mercy Rule button — only for triggered bets where debtor owes 3+ people */}
        {isTriggered && onMercy && (
          <div style={{ marginTop: 8 }}>
            <button onClick={() => onMercy(bet.debtorId)} style={{
              width: "100%", padding: "7px", fontSize: 11, fontWeight: 900,
              background: "linear-gradient(135deg, #1a472a, #2d6a4f)",
              color: "#fff", border: "none", borderRadius: 12, cursor: "pointer",
              fontFamily: "'Black Han Sans', sans-serif", letterSpacing: 0.5,
            }}>
              🪄 Invoke Kirkland Mercy Rule — Settle All {onMercy.count} Dogs at Once
            </button>
          </div>
        )}

        {/* Admin strip */}
        {adminMode && (
          <div style={{
            display: "flex", gap: 6, marginTop: 10,
            paddingTop: 10, borderTop: "1px dashed #eee",
          }}>
            <div style={{ fontSize: 9, color: "#ccc", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", alignSelf: "center", flex: 1 }}>
              🔓 ADMIN
            </div>
            <button onClick={() => onEdit(bet)} style={{
              background: "#f0f4ff", color: BLUE, border: `1px solid ${BLUE}44`,
              borderRadius: 16, padding: "5px 12px", fontWeight: 900, fontSize: 11, cursor: "pointer",
            }}>✏️ Edit</button>
            <button onClick={() => onDelete(bet.id)} style={{
              background: "#fff0f0", color: RED, border: `1px solid ${RED}44`,
              borderRadius: 16, padding: "5px 12px", fontWeight: 900, fontSize: 11, cursor: "pointer",
            }}>🗑️ Delete</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [password, setPassword]   = useState(() => localStorage.getItem("hdl-pwd") || "");
  const [state, setState]         = useState(INITIAL_STATE);
  const [syncing, setSyncing]     = useState(true);
  const [tab, setTab]             = useState("bets");
  const [adminMode, setAdmin]     = useState(false);
  const [showBetForm, setShowBetForm] = useState(false);
  const [editingBet, setEditingBet]   = useState(null);  // bet object being edited
  const [editForm, setEditForm]       = useState(null);  // form state for edit
  const [newName, setNewName]     = useState("");
  const [toast, setToast]         = useState(null);
  const [phIdx]                   = useState(() => Math.floor(Math.random() * CONDITION_PLACEHOLDERS.length));
  const [profilePerson, setProfilePerson] = useState(null); // person object
  const [showFilters, setShowFilters]     = useState(false);
  const [filters, setFilters] = useState({
    debtorId: "", recipientId: "", status: "", dateFrom: "", dateTo: "",
  });

  const [form, setForm] = useState({
    debtorId: "", recipientId: "", condition: "",
    date: new Date().toISOString().slice(0, 10),
    executive: false,
  });
  const [mercyDebtorId, setMercyDebtorId] = useState(null); // who is invoking mercy rule
  const [showMercyConfirm, setShowMercyConfirm] = useState(false);

  // Load state on mount
  useEffect(() => {
    loadState("open").then(s => {
      if (s) setState(s);
      setSyncing(false);
    });
  }, []);

  // Save state whenever it changes (debounced)
  const saveTimer = React.useRef(null);
  useEffect(() => {
    if (syncing) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveState(state, "open"), 1200);
  }, [state]);

  // Admin password check
  const [adminPwdInput, setAdminPwdInput] = useState("");
  const [showAdminPwd, setShowAdminPwd]   = useState(false);
  const [adminPwdError, setAdminPwdError] = useState(false);
  const ADMIN_PASSWORD = "mustard42"; // ← change this to your admin code word

  function handleAdminToggle() {
    if (adminMode) {
      setAdmin(false);
      setShowAdminPwd(false);
      setAdminPwdInput("");
    } else {
      setShowAdminPwd(true);
      setAdminPwdError(false);
    }
  }

  function checkAdminPassword() {
    if (adminPwdInput === ADMIN_PASSWORD) {
      setAdmin(true);
      setShowAdminPwd(false);
      setAdminPwdInput("");
      setAdminPwdError(false);
    } else {
      setAdminPwdError(true);
    }
  }

  function toast_(msg) { setToast(msg); setTimeout(() => setToast(null), 2800); }

  // ── People ────────────────────────────────────────────────────────────────
  function addPerson() {
    const name = newName.trim();
    if (!name) return;
    if (state.people.find(p => p.name.toLowerCase() === name.toLowerCase()))
      return toast_("That name's already in the dog pound 👀");
    setState(s => ({ ...s, people: [...s.people, { id: Date.now().toString(), name }] }));
    setNewName("");
    toast_(`${name} added! Fresh meat for the ledger. 🌭`);
  }

  function removePerson(id) {
    setState(s => ({
      ...s,
      people: s.people.filter(p => p.id !== id),
      bets:   s.bets.filter(b => b.debtorId !== id && b.recipientId !== id),
    }));
    toast_("Removed. They have escaped… for now. 🕵️");
  }

  // ── Bets ──────────────────────────────────────────────────────────────────
  function addBet() {
    if (!form.debtorId || !form.recipientId || !form.condition.trim())
      return toast_("Fill everything out! The hot dog gods demand it. 🌭");
    if (form.debtorId === form.recipientId)
      return toast_("You can't owe yourself a dog. That's just lunch. 🤔");
    setState(s => ({
      ...s,
      bets: [...s.bets, {
        ...form,
        condition: form.condition.trim(),
        id: Date.now().toString(),
        status: "pending",
        date: form.date || new Date().toISOString().slice(0, 10),
      }],
    }));
    const isExec = form.executive;
    setForm({ debtorId: "", recipientId: "", condition: "", date: new Date().toISOString().slice(0, 10), executive: false });
    setShowBetForm(false);
    toast_(isExec ? "🍗 EXECUTIVE BET LOGGED. Rotisserie stakes are ON." : "Bet logged. The countdown begins. ⏳🌭");
  }

  function triggerBet(id) {
    setState(s => ({
      ...s,
      bets: s.bets.map(b => b.id === id
        ? { ...b, status: "triggered", triggeredDate: new Date().toISOString() }
        : b),
    }));
    toast_("CONDITION MET. The dog is now officially owed. 🚨🌭");
  }

  function settleBet(id) {
    const bet = state.bets.find(b => b.id === id);
    if (!bet) return;
    setState(s => ({
      ...s,
      bets:    s.bets.filter(b => b.id !== id),
      settled: [...s.settled, { ...bet, settledDate: new Date().toISOString() }],
    }));
    toast_("Dog delivered. Justice has been served. Deliciously. 🌭✅");
  }

  function openEdit(bet) {
    setEditingBet(bet);
    setEditForm({
      debtorId:    bet.debtorId,
      recipientId: bet.recipientId,
      condition:   bet.condition,
      date:        bet.date,
      status:      bet.status,
      executive:   !!bet.executive,
    });
  }

  function saveEdit() {
    if (!editForm.debtorId || !editForm.recipientId || !editForm.condition.trim())
      return toast_("Fill everything out, even in admin mode. 🌭");
    if (editForm.debtorId === editForm.recipientId)
      return toast_("A person cannot owe themselves a dog. Come on. 🤦");
    setState(s => ({
      ...s,
      bets: s.bets.map(b => b.id === editingBet.id
        ? { ...b, ...editForm, condition: editForm.condition.trim() }
        : b),
    }));
    setEditingBet(null);
    setEditForm(null);
    toast_("Bet updated. The ledger has been amended. 📝🌭");
  }

  function deleteBet(id) {
    setState(s => ({ ...s, bets: s.bets.filter(b => b.id !== id) }));
    toast_("Bet deleted. It never happened. 🕵️ (It happened.)");
  }

  function invokeMercyRule(debtorId) {
    // Settle all triggered bets for this debtor at once
    const toSettle = state.bets.filter(b => b.debtorId === debtorId && b.status === "triggered");
    if (toSettle.length < 3) return toast_("Need 3+ triggered debts to invoke the Mercy Rule! 🪄");
    const now = new Date().toISOString();
    setState(s => ({
      ...s,
      bets:    s.bets.filter(b => !(b.debtorId === debtorId && b.status === "triggered")),
      settled: [...s.settled, ...toSettle.map(b => ({ ...b, settledDate: now, mercyRule: true }))],
    }));
    setShowMercyConfirm(false);
    setMercyDebtorId(null);
    const debtor = state.people.find(p => p.id === debtorId);
    toast_(`MERCY GRANTED! ${debtor?.name ?? "They"} brings churros/pizza for the group. 🍕🪄`);
  }

  // ── Filter logic ─────────────────────────────────────────────────────────
  const activeFilterCount = Object.values(filters).filter(v => v !== "").length;

  function applyFilters(bets) {
    return bets.filter(b => {
      if (filters.debtorId && b.debtorId !== filters.debtorId) return false;
      if (filters.recipientId && b.recipientId !== filters.recipientId) return false;
      if (filters.status && b.status !== filters.status) return false;
      if (filters.dateFrom && b.date < filters.dateFrom) return false;
      if (filters.dateTo   && b.date > filters.dateTo)   return false;
      return true;
    });
  }

  function applyFiltersSettled(bets) {
    return bets.filter(b => {
      if (filters.debtorId && b.debtorId !== filters.debtorId) return false;
      if (filters.recipientId && b.recipientId !== filters.recipientId) return false;
      if (filters.dateFrom && b.date < filters.dateFrom) return false;
      if (filters.dateTo   && b.date > filters.dateTo)   return false;
      return true;
    });
  }

  const filteredBets    = applyFilters(state.bets);
  const filteredTriggered = filteredBets.filter(b => b.status === "triggered");
  const filteredPending   = filteredBets.filter(b => b.status === "pending");
  const filteredSettled   = filters.status === "triggered" || filters.status === "pending"
    ? [] : applyFiltersSettled(state.settled);

  // ── Stats ─────────────────────────────────────────────────────────────────
  const stats = state.people.map(p => ({
    ...p,
    ...personStats(p.id, state.bets, state.settled),
  }));

  const triggeredBets = state.bets.filter(b => b.status === "triggered");
  const biggestDebtor = [...stats].sort((a, b) => b.triggered - a.triggered || b.pending - a.pending)[0];
  const biggestWinner = [...stats].sort((a, b) => b.dogsEaten - a.dogsEaten)[0];

  // Awards
  const allAwards     = computeAwards(state.people, state.bets, state.settled);
  const pinnedAwards  = allAwards.filter(a => a.award.pinned);
  const rotatingAwards = allAwards.filter(a => !a.award.pinned);
  const [rotatingIdx, setRotatingIdx] = useState(0);
  useEffect(() => {
    if (rotatingAwards.length === 0) return;
    const t = setInterval(() => setRotatingIdx(i => (i + 1) % rotatingAwards.length), 4000);
    return () => clearInterval(t);
  }, [rotatingAwards.length]);
  const currentRotating = rotatingAwards[rotatingIdx % Math.max(rotatingAwards.length, 1)];

  // Preview sentence
  const previewDebtor = state.people.find(p => p.id === form.debtorId);
  const previewRec    = form.recipientId ? recInfo(form.recipientId, state.people) : null;
  const preview       = previewDebtor && previewRec && form.condition.trim()
    ? `${previewDebtor.name} owes ${previewRec.label} a hot dog if ${form.condition.trim()}`
    : null;

  // ── Profile data ──────────────────────────────────────────────────────────
  const profileStats = profilePerson ? personStats(profilePerson.id, state.bets, state.settled) : null;
  const profileActiveBets = profilePerson
    ? state.bets.filter(b => b.debtorId === profilePerson.id || b.recipientId === profilePerson.id)
    : [];
  const profileSettledBets = profilePerson
    ? state.settled.filter(b => b.debtorId === profilePerson.id || b.recipientId === profilePerson.id)
    : [];

  // ── Render ────────────────────────────────────────────────────────────────

  // Loading screen
  if (syncing) {
    return (
      <div style={{
        minHeight: "100vh", background: `linear-gradient(135deg, ${RED} 0%, #8B0000 100%)`,
        display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16,
      }}>
        <div style={{ fontSize: 56 }}>🌭</div>
        <div style={{ color: "#fff", fontFamily: "'Black Han Sans', sans-serif", fontSize: 20, letterSpacing: 1 }}>
          Loading the ledger…
        </div>
      </div>
    );
  }

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div style={{
      fontFamily: "'Segoe UI', sans-serif", background: "#F2F2F2",
      minHeight: "100vh", maxWidth: 480, margin: "0 auto", paddingBottom: 110,
    }}>

      {/* ── HEADER ── */}
      <div style={{ background: `linear-gradient(135deg, ${RED} 0%, #B01228 100%)`, padding: "20px 18px 0", color: "#fff" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: 3.5, opacity: 0.65, textTransform: "uppercase", marginBottom: 2 }}>Official™ Workplace</div>
            <h1 style={{ margin: 0, fontSize: 27, fontFamily: "'Black Han Sans', sans-serif", lineHeight: 1.1, letterSpacing: 1 }}>
              HOT DOG<br />LEDGER 🌭
            </h1>
            <div style={{ fontSize: 10, opacity: 0.55, marginTop: 3 }}>$1.50 of shame per entry</div>
          </div>
          <div style={{ textAlign: "right", display: "flex", flexDirection: "column", gap: 5, alignItems: "flex-end" }}>
            {triggeredBets.length > 0 && (
              <div style={{
                background: ORANGE, color: "#fff", borderRadius: 12, padding: "5px 11px",
                fontWeight: 900, fontSize: 12, fontFamily: "'Black Han Sans', sans-serif",
                animation: "pulse 1.5s ease-in-out infinite",
              }}>
                🚨 {triggeredBets.length} DOG{triggeredBets.length > 1 ? "S" : ""} OWED NOW
              </div>
            )}
            <div style={{
              background: YELLOW, color: "#000", borderRadius: 12, padding: "5px 11px",
              fontWeight: 900, fontSize: 12, fontFamily: "'Black Han Sans', sans-serif",
            }}>
              {state.bets.length} ACTIVE BET{state.bets.length !== 1 ? "S" : ""}
            </div>
            <button onClick={handleAdminToggle} style={{
              background: adminMode ? "rgba(255,255,255,0.18)" : "transparent",
              border: "1px solid rgba(255,255,255,0.32)",
              color: adminMode ? "#fff" : "rgba(255,255,255,0.58)",
              borderRadius: 8, padding: "3px 9px",
              fontSize: 9, cursor: "pointer", letterSpacing: 1.2,
            }}>
              {adminMode ? "🔓 ADMIN" : "🔒 ADMIN"}
            </button>
          </div>
        </div>
        <div style={{ display: "flex", marginTop: 14, gap: 1 }}>
          {[
            { key: "bets",    label: "🌭 Bets",  badge: triggeredBets.length },
            { key: "board",   label: "🏆 Board" },
            { key: "history", label: "📜 History" },
            { key: "rules",   label: "📋 Rules" },
          ].map(t => <Tab key={t.key} {...t} active={tab === t.key} onClick={() => setTab(t.key)} />)}
        </div>
      </div>

      {/* ── ADMIN PANEL ── */}
      {adminMode && (
        <div style={{ background: BLUE, padding: "13px 18px" }}>
          <div style={{ color: "#fff", fontWeight: 900, fontSize: 11, marginBottom: 7, letterSpacing: 1.5 }}>👤 MANAGE PEOPLE</div>
          <div style={{ display: "flex", gap: 7 }}>
            <input value={newName} onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addPerson()}
              placeholder="Add coworker name…"
              style={{ ...inp, margin: 0, flex: 1, fontSize: 14, padding: "9px 12px" }}
            />
            <button onClick={addPerson} style={{
              background: YELLOW, color: "#000", border: "none",
              borderRadius: 10, padding: "9px 15px", fontWeight: 900, fontSize: 16, cursor: "pointer",
            }}>+</button>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 9 }}>
            {state.people.map(p => (
              <div key={p.id} style={{
                background: "rgba(255,255,255,0.14)", color: "#fff",
                borderRadius: 20, padding: "4px 10px 4px 12px",
                fontSize: 13, display: "flex", alignItems: "center", gap: 6,
              }}>
                {p.name}
                <button onClick={() => removePerson(p.id)} style={{
                  background: "rgba(255,255,255,0.18)", border: "none",
                  color: "#fff", borderRadius: "50%", width: 17, height: 17,
                  fontSize: 11, cursor: "pointer",
                }}>×</button>
              </div>
            ))}
            {!state.people.length && <span style={{ color: "rgba(255,255,255,0.45)", fontSize: 13 }}>No coworkers yet… suspicious. 🕵️</span>}
          </div>
        </div>
      )}

      {/* ── CONTENT ── */}
      <div style={{ padding: "14px 14px 0" }}>

        {/* ── BETS TAB ── */}
        {tab === "bets" && (
          <>
            {/* Filter bar */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: "#aaa", fontWeight: 700 }}>
                {filteredBets.length + filteredSettled.length} result{filteredBets.length + filteredSettled.length !== 1 ? "s" : ""}

          <select value={form.recipientId} onChange={e => setForm(f => ({ ...f, recipientId: e.target.value }))} style={sel}>
            <option value="">Select recipient…</option>
            <optgroup label="── Special ──">
              {SPECIAL_TARGETS.map(t => <option key={t.id} value={t.id}>{t.emoji} {t.name}</option>)}
            </optgroup>
            <optgroup label="── People ──">
              {state.people.filter(p => p.id !== form.debtorId).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </optgroup>
          </select>

          <label style={lbl}>⚡ If… <span style={{ color: "#bbb", fontWeight: 400 }}>(the condition)</span></label>
          <input value={form.condition} onChange={e => setForm(f => ({ ...f, condition: e.target.value }))}
            placeholder={CONDITION_PLACEHOLDERS[phIdx]} style={inp} />

          <label style={lbl}>📅 Date bet was made</label>
          <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} style={inp} />

          <div onClick={() => setForm(f => ({ ...f, executive: !f.executive }))} style={{
              display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
              borderRadius: 12, marginBottom: 11, cursor: "pointer",
              background: form.executive ? "linear-gradient(135deg, #F5EEFF, #FFF8E1)" : "#f8f8f8",
              border: `2px solid ${form.executive ? PURPLE : "#ddd"}`,
              transition: "all 0.2s",
            }}>
              <div style={{ fontSize: 28 }}>🍗</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 900, fontSize: 13, color: form.executive ? PURPLE : "#555" }}>Executive Multiplier</div>
                <div style={{ fontSize: 11, color: "#aaa" }}>Upgrades stakes to a Rotisserie Chicken</div>
              </div>
              <div style={{
                width: 42, height: 24, borderRadius: 12,
                background: form.executive ? PURPLE : "#ccc",
                position: "relative", transition: "background 0.2s",
              }}>
                <div style={{
                  position: "absolute", top: 3, left: form.executive ? 20 : 3,
                  width: 18, height: 18, borderRadius: "50%", background: "#fff",
                  transition: "left 0.2s",
                }} />
              </div>
          </div>

          <button onClick={addBet} style={{
            width: "100%", padding: "14px",
            background: form.executive ? `linear-gradient(135deg, ${PURPLE}, ${CHICKEN_GOLD})` : RED,
            color: "#fff", border: "none", borderRadius: 12, fontWeight: 900, fontSize: 16,
            cursor: "pointer", fontFamily: "'Black Han Sans', sans-serif", letterSpacing: 1, marginTop: 3,
          }}>{form.executive ? "🍗 ENTER THE CHICKEN INTO THE LEDGER" : "🌭 ENTER THE DOG INTO THE LEDGER"}</button>
        </BottomSheet>
      )}

      {/* ── PROFILE SHEET ── */}
      {profilePerson && profileStats && (
        <BottomSheet title={`${profilePerson.name}'s Dossier`} onClose={() => setProfilePerson(null)} accent={BLUE}>

          {/* Avatar + headline */}
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
            <Avatar name={profilePerson.name} size={60} />
            <div>
              <div style={{ fontWeight: 900, fontSize: 20, fontFamily: "'Black Han Sans', sans-serif" }}>{profilePerson.name}</div>
              <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>
                {profileStats.triggered > 0
                  ? `🚨 Currently owes ${profileStats.triggered} dog${profileStats.triggered !== 1 ? "s" : ""} RIGHT NOW`
                  : profileStats.pending > 0
                  ? `⏳ ${profileStats.pending} pending bet${profileStats.pending !== 1 ? "s" : ""}`
                  : "😇 Clean slate"}
              </div>
            </div>
          </div>

          {/* Stat grid */}
          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            <StatPill value={profileStats.dogsEaten} label="Dogs Eaten" color={GREEN}  emoji="🌭" />
            <StatPill value={profileStats.charges}   label="$1.50 Charges" color={RED} emoji="🧾" />
            <StatPill value={profileStats.pending}   label="Dogs on the Line" color="#666" emoji="🎲" />
            <StatPill value={profileStats.triggered} label="Owed by Me" color={ORANGE} emoji="🚨" />
            <StatPill value={profileStats.owedToMe}  label="Coming to Me" color={GREEN} emoji="🍽️" />
          </div>

          {/* Trophy case */}
          {(() => {
            const profileAwards = allAwards.filter(a => a.winner.id === profilePerson.id);
            if (profileAwards.length === 0) return null;
            return (
              <>
                <div style={{ fontWeight: 900, fontSize: 11, color: "#aaa", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>
                  🏅 Awards ({profileAwards.length})
                </div>
                {profileAwards.map(a => (
                  <AwardCard key={a.award.id} {...a} people={state.people} size="compact" />
                ))}
              </>
            );
          })()}

          {/* Active bets */}
          {profileActiveBets.length > 0 && (
            <>
              <div style={{ fontWeight: 900, fontSize: 11, color: "#aaa", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>
                Active Bets ({profileActiveBets.length})
              </div>
              {profileActiveBets.map(bet => (
                <MiniBetCard key={bet.id} bet={bet} people={state.people} isSettled={false} personId={profilePerson.id} />
              ))}
            </>
          )}

          {/* Settled bets */}
          {profileSettledBets.length > 0 && (
            <>
              <div style={{ fontWeight: 900, fontSize: 11, color: "#aaa", letterSpacing: 2, textTransform: "uppercase", margin: "14px 0 8px" }}>
                Settled Bets ({profileSettledBets.length})
              </div>
              {[...profileSettledBets].reverse().map(bet => (
                <MiniBetCard key={bet.id} bet={bet} people={state.people} isSettled={true} personId={profilePerson.id} />
              ))}
            </>
          )}

          {profileActiveBets.length === 0 && profileSettledBets.length === 0 && (
            <div style={{ textAlign: "center", padding: "30px 0", color: "#ccc" }}>
              <div style={{ fontSize: 40 }}>🌭</div>
              <div style={{ fontSize: 13, marginTop: 6 }}>No bets yet. A suspicious level of innocence.</div>
            </div>
          )}
        </BottomSheet>
      )}

      {/* ── EDIT BET SHEET ── */}
      {editingBet && editForm && (
        <BottomSheet title="✏️ Edit Bet" onClose={() => { setEditingBet(null); setEditForm(null); }} accent={BLUE}>

          {/* Live preview */}
          {(() => {
            const d = state.people.find(p => p.id === editForm.debtorId);
            const r = editForm.recipientId ? recInfo(editForm.recipientId, state.people) : null;
            const prev = d && r && editForm.condition.trim()
              ? `${d.name} owes ${r.label} a hot dog if ${editForm.condition.trim()}`
              : null;
            return (
              <div style={{
                background: prev ? "#FFFBEA" : "#f8f8f8",
                border: `2px dashed ${prev ? YELLOW : "#ddd"}`,
                borderRadius: 12, padding: "11px 13px", marginBottom: 18,
                minHeight: 50, display: "flex", alignItems: "center",
              }}>
                {prev
                  ? <span style={{ fontWeight: 700, fontSize: 14, color: "#222", lineHeight: 1.5 }}>🌭 {prev}</span>
                  : <span style={{ fontSize: 12, color: "#bbb", fontStyle: "italic" }}>Fill in all fields to preview…</span>
                }
              </div>
            );
          })()}

          <label style={lbl}>🫣 Who's on the hook?</label>
          <select value={editForm.debtorId} onChange={e => setEditForm(f => ({ ...f, debtorId: e.target.value }))} style={sel}>
            <option value="">Select person…</option>
            {state.people.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>

          <label style={lbl}>🏆 Who do they owe?</label>
          <select value={editForm.recipientId} onChange={e => setEditForm(f => ({ ...f, recipientId: e.target.value }))} style={sel}>
            <option value="">Select recipient…</option>
            <optgroup label="── Special ──">
              {SPECIAL_TARGETS.map(t => <option key={t.id} value={t.id}>{t.emoji} {t.name}</option>)}
            </optgroup>
            <optgroup label="── People ──">
              {state.people.filter(p => p.id !== editForm.debtorId).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </optgroup>
          </select>

          <label style={lbl}>⚡ If…</label>
          <input value={editForm.condition} onChange={e => setEditForm(f => ({ ...f, condition: e.target.value }))} style={inp} />

          <label style={lbl}>📅 Date bet was made</label>
          <input type="date" value={editForm.date} onChange={e => setEditForm(f => ({ ...f, date: e.target.value }))} style={inp} />

          <label style={lbl}>📊 Status</label>
          <select value={editForm.status} onChange={e => setEditForm(f => ({ ...f, status: e.target.value }))} style={sel}>
            <option value="pending">⏳ Pending</option>
            <option value="triggered">🚨 Triggered</option>
          </select>

          <div onClick={() => setEditForm(f => ({ ...f, executive: !f.executive }))} style={{
            display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
            borderRadius: 12, marginBottom: 11, cursor: "pointer",
            background: editForm.executive ? "linear-gradient(135deg, #F5EEFF, #FFF8E1)" : "#f8f8f8",
            border: `2px solid ${editForm.executive ? PURPLE : "#ddd"}`,
          }}>
            <div style={{ fontSize: 24 }}>🍗</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 900, fontSize: 13, color: editForm.executive ? PURPLE : "#555" }}>Executive Multiplier</div>
              <div style={{ fontSize: 11, color: "#aaa" }}>Rotisserie Chicken stakes</div>
            </div>
            <div style={{ width: 42, height: 24, borderRadius: 12, background: editForm.executive ? PURPLE : "#ccc", position: "relative" }}>
              <div style={{ position: "absolute", top: 3, left: editForm.executive ? 20 : 3, width: 18, height: 18, borderRadius: "50%", background: "#fff", transition: "left 0.2s" }} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
            <button onClick={() => { deleteBet(editingBet.id); setEditingBet(null); setEditForm(null); }} style={{
              flex: 1, padding: "12px", background: "#fff0f0", color: RED,
              border: `2px solid ${RED}44`, borderRadius: 12,
              fontWeight: 900, fontSize: 14, cursor: "pointer",
            }}>🗑️ Delete Bet</button>
            <button onClick={saveEdit} style={{
              flex: 2, padding: "12px", background: BLUE, color: "#fff",
              border: "none", borderRadius: 12, fontWeight: 900, fontSize: 14,
              cursor: "pointer", fontFamily: "'Black Han Sans', sans-serif",
            }}>💾 Save Changes</button>
          </div>
        </BottomSheet>
      )}

      {/* ── MERCY CONFIRM MODAL ── */}
      {showMercyConfirm && mercyDebtorId && (() => {
        const debtor = state.people.find(p => p.id === mercyDebtorId);
        const dogs = state.bets.filter(b => b.debtorId === mercyDebtorId && b.status === "triggered");
        return (
          <div style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)",
            zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
          }} onClick={() => setShowMercyConfirm(false)}>
            <div onClick={e => e.stopPropagation()} style={{
              background: "#fff", borderRadius: 20, padding: 24, maxWidth: 380, width: "100%",
              border: `3px solid #2d6a4f`,
              boxShadow: "0 8px 40px rgba(0,0,0,0.4)",
            }}>
              <div style={{ textAlign: "center", fontSize: 52, marginBottom: 8 }}>🪄</div>
              <h2 style={{ margin: "0 0 8px", textAlign: "center", fontFamily: "'Black Han Sans', sans-serif", color: "#1a472a", fontSize: 22 }}>
                Kirkland Mercy Rule
              </h2>
              <p style={{ fontSize: 13, color: "#555", textAlign: "center", margin: "0 0 16px", lineHeight: 1.5 }}>
                <strong>{debtor?.name}</strong> owes <strong>{dogs.length} dogs</strong> simultaneously.
                They may settle ALL debts at once by bringing one (1) box of churros
                or a whole pizza for the group.
              </p>
              <div style={{
                background: "#f0faf4", borderRadius: 12, padding: "10px 14px", marginBottom: 16,
                border: "1px solid #2d6a4f33",
              }}>
                {dogs.map(b => {
                  const rec = recInfo(b.recipientId, state.people);
                  return (
                    <div key={b.id} style={{ fontSize: 12, color: "#333", padding: "3px 0", borderBottom: "1px solid #eee" }}>
                      🌭 → {rec.label}: <em>if {b.condition}</em>
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => { setShowMercyConfirm(false); setMercyDebtorId(null); }} style={{
                  flex: 1, padding: "12px", background: "#eee", color: "#555",
                  border: "none", borderRadius: 12, fontWeight: 900, fontSize: 13, cursor: "pointer",
                }}>Cancel</button>
                <button onClick={() => invokeMercyRule(mercyDebtorId)} style={{
                  flex: 2, padding: "12px",
                  background: "linear-gradient(135deg, #1a472a, #2d6a4f)",
                  color: "#fff", border: "none", borderRadius: 12,
                  fontWeight: 900, fontSize: 13, cursor: "pointer",
                  fontFamily: "'Black Han Sans', sans-serif",
                }}>🍕 Grant Mercy — Churros/Pizza Incoming</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── ADMIN PASSWORD MODAL ── */}
      {showAdminPwd && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)",
          zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        }} onClick={() => { setShowAdminPwd(false); setAdminPwdInput(""); setAdminPwdError(false); }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "#fff", borderRadius: 20, padding: "28px 24px",
            maxWidth: 320, width: "100%", textAlign: "center",
            boxShadow: "0 8px 40px rgba(0,0,0,0.4)",
          }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>🔒</div>
            <div style={{ fontFamily: "'Black Han Sans', sans-serif", fontSize: 20, color: BLUE, marginBottom: 4 }}>
              Admin Access
            </div>
            <div style={{ fontSize: 12, color: "#aaa", marginBottom: 20 }}>
              Enter the admin code word
            </div>
            <input
              autoFocus
              value={adminPwdInput}
              onChange={e => { setAdminPwdInput(e.target.value); setAdminPwdError(false); }}
              onKeyDown={e => e.key === "Enter" && checkAdminPassword()}
              placeholder="Code word…"
              type="password"
              style={{
                width: "100%", padding: "12px 14px", fontSize: 15,
                border: `2px solid ${adminPwdError ? RED : "#e0e0e0"}`, borderRadius: 12,
                boxSizing: "border-box", outline: "none", marginBottom: 8,
                fontFamily: "inherit", textAlign: "center", letterSpacing: 2,
              }}
            />
            {adminPwdError && (
              <div style={{ color: RED, fontSize: 12, fontWeight: 700, marginBottom: 8 }}>
                Wrong code. Not today. 🌭
              </div>
            )}
            <button onClick={checkAdminPassword} style={{
              width: "100%", padding: "12px", background: BLUE, color: "#fff",
              border: "none", borderRadius: 12, fontWeight: 900, fontSize: 15,
              cursor: "pointer", fontFamily: "'Black Han Sans', sans-serif",
            }}>🔓 Unlock Admin</button>
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 96, left: "50%", transform: "translateX(-50%)",
          background: "#1a1a1a", color: "#fff", borderRadius: 22, padding: "10px 20px",
          fontSize: 13, fontWeight: 700, boxShadow: "0 4px 18px rgba(0,0,0,0.32)",
          zIndex: 9999, whiteSpace: "nowrap", animation: "fadeUp 0.22s ease",
        }}>{toast}</div>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateX(-50%) translateY(10px); }
          to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes pulse {
          0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.4); }
          50%       { box-shadow: 0 0 0 6px rgba(255,107,0,0); }
        }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
